services:
  db:
    image: mysql:8.0
    container_name: logi-canvus-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-logi_canvus}
      MYSQL_USER: ${MYSQL_USER:-logi_canvus}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-logi_canvus}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      retries: 10

volumes:
  mysql_data:
